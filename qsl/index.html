<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QSL | BG7KUH</title>
<style>
:root {
  --card-w: 140mm;
  --card-h: 90mm;
  --bg: #f7f7f8;
  --ink: #111;
  --line: #d0d3d8;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  width: min(980px, 92vw);
  height: auto;
  aspect-ratio: 14 / 9;
  background: #fff;
  border: 1px solid #e2e5ea;
  border-radius: 8px;
  box-shadow: 0 12px 24px rgba(0,0,0,0.08);
  display: grid;
  grid-template-rows: auto 1fr auto;
}
.header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 18px 22px 12px;
  border-bottom: 2px solid #111;
}
.callsign {
  font-size: clamp(28px, 6vw, 44px);
  line-height: 1;
  font-weight: 800;
  letter-spacing: 2px;
}
.brand {
  text-align: right;
}
.brand .title {
  font-size: clamp(12px, 2.4vw, 16px);
  font-weight: 700;
}
.brand .sub {
  font-size: clamp(11px, 2vw, 14px);
  opacity: .8;
}
.address {
  padding: 0 22px 10px;
  font-size: clamp(11px, 2vw, 13px);
}
.section {
  padding: 14px 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
}
.field {
  display: grid;
  grid-template-rows: auto 28px;
}
.label {
  font-size: clamp(10px, 1.8vw, 12px);
  opacity: .75;
}
.line {
  border-bottom: 1px dashed var(--line);
}
.full {
  grid-column: 1 / -1;
}
.table {
  padding: 0 22px 12px;
}
.table table {
  width: 100%;
  border-collapse: collapse;
}
.table th, .table td {
  border: 1px solid #cfd3da;
  padding: 6px 8px;
  font-size: clamp(11px, 2vw, 12px);
  text-align: center;
}
.footer {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 12px;
  padding: 12px 22px 16px;
}
.qsl-method {
  display: flex;
  gap: 12px;
  font-size: clamp(11px, 2vw, 12px);
}
.qsl-method .box {
  width: 14px;
  height: 14px;
  border: 1px solid #9aa2aa;
  margin-right: 6px;
  display: inline-block;
  vertical-align: middle;
}
.sign {
  text-align: right;
  font-size: clamp(11px, 2vw, 12px);
}
.sign .line {
  width: 160px;
  margin-left: auto;
  border-bottom: 1px solid var(--line);
}
.badge {
  color: #fff;
  background: #0aa;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: clamp(10px, 1.8vw, 11px);
  font-weight: 700;
  display: inline-block;
}
@media (max-width: 700px) {
  .header { padding: 14px 16px 10px; }
  .address { padding: 0 16px 8px; }
  .section { padding: 12px 16px; grid-template-columns: 1fr; gap: 8px 12px; }
  .table { padding: 0 16px 10px; }
  .footer { padding: 10px 16px 14px; grid-template-columns: 1fr; gap: 8px; }
  .sign .line { width: 140px; }
}
@media (orientation: landscape) and (min-width: 900px) {
  .card { width: min(1100px, 90vw); }
}
@media print {
  body {
    background: #fff;
    padding: 0;
  }
  .card {
    box-shadow: none;
    margin: 0;
    border-radius: 0;
    width: var(--card-w);
    height: var(--card-h);
  }
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="callsign">BG7KUH</div>
    <div class="brand">
      <div class="title">QSL CARD</div>
      <div class="sub">PANYU, GUANGZHOU, CHINA</div>
    </div>
  </div>
  <div class="address">Address: PANYU, GUANGZHOU, CHINA</div>
  <div class="section">
    <div class="field">
      <div class="label">To Station</div>
      <div class="line"></div>
    </div>
    <div class="field">
      <div class="label">Operator</div>
      <div class="line"></div>
    </div>
    <div class="field">
      <div class="label">Grid</div>
      <div class="line"></div>
    </div>
    <div class="field">
      <div class="label">QTH</div>
      <div class="line"></div>
    </div>
    <div class="field">
      <div class="label">Antenna</div>
      <div class="line"></div>
    </div>
    <div class="field">
      <div class="label">TX Power</div>
      <div class="line"></div>
    </div>
    <div class="field full">
      <span class="badge">QSO Confirmation</span>
    </div>
  </div>
  <div class="table">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time (UTC)</th>
          <th>Freq/Band</th>
          <th>Mode</th>
          <th>RST Sent</th>
          <th>RST Rcvd</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="footer">
    <div class="qsl-method">
      <span>QSL via:</span>
      <span class="box"></span><span>Direct</span>
      <span class="box"></span><span>Bureau</span>
      <span class="box"></span><span>Electronic</span>
    </div>
    <div class="sign">
      <div>Signature</div>
      <div class="line"></div>
    </div>
  </div>
</div>
</body>
</html>
